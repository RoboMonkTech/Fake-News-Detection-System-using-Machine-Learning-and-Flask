<!DOCTYPE html>

<html>
<head>
    <title>Fake News Detection System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">


<h1>📰 Fake News Detection System</h1>

<p>Enter a news article and check whether it is Real or Fake.</p>

<form method="POST">

    <textarea
        name="news"
        placeholder="Paste the news article here..."
        required>
    </textarea>

    <br><br>

    <button type="submit">
        Check News
    </button>

</form>

<h2>{{ prediction }}</h2>


</div>

</body>
</html>
